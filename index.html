<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ER Team Picker</title>
    <link rel="icon" href="assets/app-icon.png" type="image/png">
    <link rel="stylesheet" href="src/styles.css">
    <style>
      /* ── Splash screen ── */
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #0e0e0e;
        transition: opacity 350ms ease;
      }
      #splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .splash-icon {
        width: 96px;
        height: 96px;
        border-radius: 22px;
      }
      .splash-app-name {
        font-family: system-ui, sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: #ffffff;
        margin: 0;
      }
      .splash-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255,255,255,0.12);
        border-top-color: rgba(255,255,255,0.7);
        border-radius: 50%;
        animation: splashSpin 0.75s linear infinite;
        margin-top: 4px;
      }
      @keyframes splashSpin {
        to { transform: rotate(360deg); }
      }

      .language-gate {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        padding: 28px;
        background:
          radial-gradient(circle at 18% 18%, rgba(67, 194, 223, 0.2), transparent 30%),
          radial-gradient(circle at 78% 28%, rgba(146, 97, 255, 0.2), transparent 32%),
          #080d14;
      }

      .language-gate[hidden] {
        display: none;
      }

      .language-panel {
        width: min(920px, 100%);
        padding: 28px;
        border: 1px solid rgba(126, 150, 180, 0.28);
        border-radius: 18px;
        background: rgba(17, 26, 39, 0.92);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.44);
      }

      .language-panel h1 {
        margin: 0;
        color: #f5f8ff;
        font-size: 30px;
        letter-spacing: 0;
      }

      .language-panel p {
        margin: 10px 0 22px;
        color: #aebbd0;
        font-weight: 750;
      }

      .language-options {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
      }

      .language-card {
        min-height: 116px;
        border: 1px solid rgba(126, 150, 180, 0.32);
        border-radius: 14px;
        background: #172233;
        color: #f5f8ff;
        font-size: 18px;
        font-weight: 900;
        cursor: pointer;
      }

      .language-card:hover {
        border-color: rgba(67, 194, 223, 0.72);
        background: rgba(67, 194, 223, 0.14);
      }

      @media (max-width: 760px) {
        .language-options {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen" aria-hidden="true">
      <img class="splash-icon" src="assets/app-icon.png" alt="">
      <p class="splash-app-name">ER Team Picker</p>
      <div class="splash-spinner"></div>
    </div>

    <div class="language-gate" id="language-gate" hidden>
      <section class="language-panel" aria-labelledby="language-title">
        <h1 id="language-title" data-i18n="language.title"></h1>
        <p data-i18n="language.subtitle"></p>
        <div class="language-options">
          <button class="language-card" type="button" data-language-option="ko" data-i18n="language.ko"></button>
          <button class="language-card" type="button" data-language-option="en" data-i18n="language.en"></button>
          <button class="language-card" type="button" data-language-option="ja" data-i18n="language.ja"></button>
          <button class="language-card" type="button" data-language-option="zhHans" data-i18n="language.zhHans"></button>
          <button class="language-card" type="button" data-language-option="zhHant" data-i18n="language.zhHant"></button>
        </div>
      </section>
    </div>

    <main class="app-shell" id="app-shell" style="opacity:0;transition:opacity 180ms ease">
      <aside class="app-sidebar" data-i18n-label="app.sidebarLabel">
        <div class="brand-panel">
          <img src="assets/app-icon.png" alt="">
          <strong>ER Team Picker</strong>
          <span data-i18n="app.brandSubtitle"></span>
        </div>
        <nav class="side-nav" data-i18n-label="app.sidebarLabel">
          <button class="side-tab active" type="button" data-view="setup" data-i18n="nav.setup"></button>
          <button class="side-tab" type="button" data-view="recommendations" data-i18n="nav.recommendations"></button>
          <button class="side-tab" type="button" data-view="union" data-i18n="nav.union"></button>
        </nav>
        <div class="side-footer">
          <button class="settings-contact-button" id="settings-contact-button" type="button" data-i18n="button.contact"></button>
          <button class="update-button" id="update-check-button" type="button" data-i18n="button.updateCheck"></button>
          <div class="update-status" id="update-status" role="status"></div>
          <button class="settings-button" id="settings-open-button" type="button" data-i18n="button.settings"></button>
        </div>
      </aside>

      <section class="app-main" data-view="setup">
        <header class="topbar">
          <div>
            <p class="eyebrow" data-i18n="topbar.eyebrow.setup"></p>
            <h1 data-i18n="topbar.title.setup"></h1>
          </div>
          <div class="topbar-actions">
            <div class="summary-pill">
              <span id="selected-count">0</span>
              <span data-i18n="topbar.selectedSuffix"></span>
            </div>
            <label class="tier-select">
              <span data-i18n="tier.label"></span>
              <select id="tier-select">
                <option value="all" data-i18n="tier.all"></option>
                <option value="iron_bronze" data-i18n="tier.ironBronze"></option>
                <option value="silver_gold" data-i18n="tier.silverGold"></option>
                <option value="platinum_diamond" data-i18n="tier.platinumDiamond"></option>
                <option value="meteor_mithril" data-i18n="tier.meteorMithril"></option>
                <option value="demigod_eternity" data-i18n="tier.demigodEternity"></option>
              </select>
            </label>
          </div>
        </header>

        <div class="workspace">
          <section class="content-stack">
            <section class="panel roster-panel" id="team-section">
              <div class="panel-header">
                <div>
                  <p class="section-kicker" data-i18n="section.teamSetup.kicker"></p>
                  <h2 data-i18n="section.teamSetup.title"></h2>
                </div>
                <button class="ghost-button" id="clear-button" type="button" data-i18n="button.reset"></button>
              </div>
              <p class="helper-text" data-i18n="section.teamSetup.helper"></p>
              <div class="manual-slots" id="manual-slots">
                <button class="manual-slot self-slot" type="button" data-manual-slot="0" data-i18n="slot.self"></button>
                <button class="manual-slot" type="button" data-manual-slot="1" data-i18n="slot.teammate1"></button>
                <button class="manual-slot" type="button" data-manual-slot="2" data-i18n="slot.teammate2"></button>
              </div>
              <div class="selected-team" id="selected-team"></div>
            </section>

            <section class="panel guide-strip">
              <strong data-i18n="guide.title"></strong>
              <span data-i18n="guide.body"></span>
            </section>

            <section class="panel character-panel">
              <div class="panel-header">
                <div>
                  <p class="section-kicker" data-i18n="section.roster.kicker"></p>
                  <h2 data-i18n="section.roster.title"></h2>
                </div>
              </div>
              <label class="search-box">
                <span data-i18n="search.label"></span>
                <input id="search-input" type="search" data-i18n-placeholder="search.placeholder">
              </label>
              <div class="playable-tools">
                <button class="ghost-button" id="playable-mode-button" type="button" aria-pressed="false" data-i18n="button.playableMode"></button>
                <button class="ghost-button" id="clear-playable-button" type="button" data-i18n="button.clearPlayable"></button>
                <span id="playable-status" data-i18n="playable.status.all"></span>
              </div>
              <div class="playable-presets">
                <input id="playable-preset-name" type="text" maxlength="18" data-i18n-placeholder="preset.namePlaceholder">
                <select id="playable-preset-select">
                  <option value="" data-i18n="preset.empty"></option>
                </select>
                <button class="ghost-button" id="save-playable-preset-button" type="button" data-i18n="button.save"></button>
                <button class="ghost-button" id="load-playable-preset-button" type="button" data-i18n="button.load"></button>
                <button class="ghost-button" id="delete-playable-preset-button" type="button" data-i18n="button.delete"></button>
              </div>
              <div class="filter-row" id="role-filters"></div>
              <div class="character-grid" id="character-grid"></div>
              <div class="detected-team" id="detected-team"></div>
            </section>
          </section>

          <aside class="result-column">
            <section class="panel result-panel" id="recommend-section">
              <div class="panel-header">
                <div>
                  <p class="section-kicker" data-i18n="section.recommendation.kicker"></p>
                  <h2 data-i18n="section.recommendation.title"></h2>
                </div>
                <div class="status-group">
                  <span class="sync-chip" id="sync-status" data-i18n="sync.local"></span>
                </div>
              </div>
              <div class="recommendations" id="recommendations"></div>
            </section>

            <section class="panel feedback-panel" id="feedback-section">
              <div class="panel-header">
                <div>
                  <p class="section-kicker" data-i18n="section.review.kicker"></p>
                  <h2 data-i18n="section.review.title"></h2>
                </div>
              </div>
              <div class="match-feedback" id="match-feedback"></div>
            </section>
          </aside>
        </div>

        <section class="union-view">
          <section class="panel union-builder">
            <div class="panel-header">
              <div>
                <p class="section-kicker" data-i18n="section.union.kicker"></p>
                <h2 data-i18n="section.union.title"></h2>
              </div>
              <button class="ghost-button" id="union-clear-button" type="button" data-i18n="button.reset"></button>
            </div>
            <p class="helper-text" data-i18n="section.union.helper"></p>
            <div class="union-player-grid" id="union-player-grid"></div>
            <div class="union-preset-panel" id="union-preset-panel"></div>
            <label class="search-box union-search">
              <span data-i18n="search.label"></span>
              <input id="union-search-input" type="search" data-i18n-placeholder="union.search.placeholder">
            </label>
            <div class="filter-row" id="union-role-filters"></div>
            <div class="union-character-grid" id="union-character-grid"></div>
          </section>

          <section class="panel union-result-panel">
            <div class="panel-header">
              <div>
                <p class="section-kicker" data-i18n="section.recommendation.kicker"></p>
                <h2 data-i18n="union.result.title"></h2>
              </div>
              <div class="union-result-actions">
                <button class="primary-button union-confirm-button" id="union-confirm-button" type="button" data-i18n="button.unionConfirm"></button>
                <span class="sync-chip" id="union-summary" data-i18n="union.summary.empty"></span>
              </div>
            </div>
            <div class="union-results" id="union-results"></div>
          </section>
        </section>
      </section>
    </main>

    <div class="contact-modal" id="contact-modal" hidden>
      <div class="contact-backdrop" data-contact-close></div>
      <section class="contact-dialog" role="dialog" aria-modal="true" aria-labelledby="contact-title">
        <div class="panel-header">
          <div>
            <p class="section-kicker" data-i18n="contact.kicker"></p>
            <h2 id="contact-title" data-i18n="contact.title"></h2>
          </div>
          <button class="icon-button" type="button" data-contact-close data-i18n-label="contact.closeLabel">x</button>
        </div>
        <form class="contact-form" id="contact-form">
          <label>
            <span data-i18n="contact.replyLabel"></span>
            <input id="contact-reply" type="email" autocomplete="email" required data-i18n-placeholder="contact.replyPlaceholder">
          </label>
          <label>
            <span data-i18n="contact.messageLabel"></span>
            <textarea id="contact-message" rows="7" maxlength="1200" required data-i18n-placeholder="contact.messagePlaceholder"></textarea>
          </label>
          <p class="contact-note" data-i18n="contact.note"></p>
          <div class="contact-actions">
            <span id="contact-status" role="status"></span>
            <button class="ghost-button" type="button" data-contact-close data-i18n="button.cancel"></button>
            <button class="primary-button contact-submit" type="submit" data-i18n="button.send"></button>
          </div>
        </form>
      </section>
    </div>

    <div class="settings-modal" id="settings-modal" hidden>
      <div class="settings-backdrop" data-settings-close></div>
      <section class="settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="panel-header">
          <h2 id="settings-title" data-i18n="settings.title"></h2>
          <button class="icon-button" type="button" data-settings-close data-i18n-label="contact.closeLabel">x</button>
        </div>
        <div class="settings-body">
          <section class="settings-section">
            <h3 class="settings-section-label" data-i18n="settings.languageSection"></h3>
            <div class="settings-language-grid">
              <button class="settings-language-card" type="button" data-language-option="ko" data-i18n="language.ko"></button>
              <button class="settings-language-card" type="button" data-language-option="en" data-i18n="language.en"></button>
              <button class="settings-language-card" type="button" data-language-option="ja" data-i18n="language.ja"></button>
              <button class="settings-language-card" type="button" data-language-option="zhHans" data-i18n="language.zhHans"></button>
              <button class="settings-language-card" type="button" data-language-option="zhHant" data-i18n="language.zhHant"></button>
            </div>
          </section>
          <section class="settings-section">
            <h3 class="settings-section-label" data-i18n="settings.themeSection"></h3>
            <button class="settings-theme-toggle" id="settings-theme-toggle" type="button" aria-pressed="true"></button>
          </section>
        </div>
      </section>
    </div>

    <script type="module" src="src/app.js?v=0.2.1"></script>
  </body>
</html>
