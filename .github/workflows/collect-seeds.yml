name: Collect Tier Seeds

on:
  schedule:
    - cron: '0 */6 * * *' # 6시간마다 실행 (KST 09:00, 15:00, 21:00, 03:00)
  workflow_dispatch:       # GitHub UI에서 수동 실행 가능

concurrency:
  group: collect-tier-seeds-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 최대 5시간

    permissions:
      contents: write      # 결과 파일 commit 권한

    env:
      CURRENT_PATCH: ${{ vars.CURRENT_PATCH || secrets.CURRENT_PATCH || 'current' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore game cache
        uses: actions/cache@v4
        with:
          path: |
            data/official-cache
            data/official-next-seeds.json
            data/official-match-input-accumulated.json
          key: official-cache-${{ github.run_id }}
          restore-keys: official-cache-

      - name: Write secrets to disk
        run: |
          echo "ER_API_KEY=${{ secrets.ER_API_KEY }}" > .env
          mkdir -p data
          echo '${{ secrets.TIER_SEEDS }}' > data/official-tier-seeds.json

      - name: Collect seed-tier match data
        run: |
          node tools/official_seed_collector.mjs \
            --games-per-user 10 \
            --depth 2 \
            --max-users-per-tier 350 \
            --target-teams 12000 \
            --next-seed-count 15 \
            --delay-ms 1000 \
            --retry-429-ms 60000

      - name: Accumulate match data
        run: |
          node tools/merge_match_input.mjs \
            --accumulated data/official-match-input-accumulated.json \
            --new data/official-match-input-seeded.json

      - name: Build combined stats
        run: |
          node tools/build_official_stats.mjs \
            --in data/official-match-input-accumulated.json

      - name: Export ML training artifact
        run: |
          node tools/export_ml_training_data.mjs \
            --in data/official-match-input-accumulated.json \
            --out-dir data/ml-training \
            --patch "$CURRENT_PATCH"

      - name: Upload collected data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collected-official-data
          retention-days: 90
          path: |
            data/official-match-input-seeded.json
            data/official-match-input-accumulated.json
            data/ml-training/*.jsonl
            data/ml-training/*.manifest.json
            src/officialMatchStats.js
            src/officialMatchStats.json
            data/official-next-seeds.json
          if-no-files-found: ignore

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/officialMatchStats.js 2>/dev/null || true
          git add src/officialMatchStats.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update tier match data [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
